<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Estação de Pesquisa — Criptoativos e Web3</title>
  <style>
    /* ==================== CSS COMPLETO (mantido exatamente igual ao original) ==================== */
    :root {
      --bg: #f8f5f0;
      --card-bg: #ffffff;
      --petroleum: #0d4f5c;
      --petroleum-light: #1a6e7a;
      --gold-dark: #8B6914;
      --gold: #b8860b;

      --shadow-lg: 4px 4px 16px rgba(0,0,0,0.12);

      --warning: #b8860b;

      --web3-purple-light: #9b4dca;
      --defi-green: #0d5c3a;
      --defi-green-light: #1a8a5a;

      --nft-pink-light: #e91e63;
      --dao-orange: #e65100;
      --scroll-bg: #f5efe6;

    * { box-sizing: border-box; margin: 0; padding: 0; border-radius: 0 !important; }

      color: var(--text);

      padding: 16px;

      margin: 0 auto;

      border: 1px solid var(--border);
      margin-bottom: 16px;
      gap: 12px;
      flex-wrap: wrap;
      border-left: 6px solid var(--crypto-blue);

    .badge-nft { background: var(--nft-pink); color: white; font-size: 0.6rem; font-weight: bold; padding: 4px 10px; letter-spacing: 1px; text-transform: uppercase; }
    .badge-dao { background: var(--dao-orange); color: white; font-size: 0.6rem; font-weight: bold; padding: 4px 10px; letter-spacing: 1px; text-transform: uppercase; }

      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;

      font-family: var(--font-mono);
